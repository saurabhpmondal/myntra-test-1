<div class="filter-bar">

    <div class="filter-grid">

        <!-- Period -->

        <div class="filter-item">

            <label>Period</label>

            <select id="filter-period">

            </select>

        </div>

        <!-- Brand -->

        <div class="filter-item">

            <label>Brand</label>

            <select id="filter-brand">

            </select>

        </div>

        <!-- Category -->

        <div class="filter-item">

            <label>Category</label>

            <select id="filter-category">

            </select>

        </div>

        <!-- ERP Status -->

        <div class="filter-item">

            <label>ERP Status</label>

            <select id="filter-status">

            </select>

        </div>

        <!-- Search -->

        <div class="filter-item search-box">

            <label>Search</label>

            <input

                id="filter-search"

                type="text"

                placeholder="Style ID / ERP SKU">

        </div>

    </div>

    <div class="filter-actions">

        <button
            id="resetFilters"
            class="secondary">

            Reset

        </button>

        <button
            id="applyFilters"
            class="primary">

            Apply Filters

        </button>

    </div>

</div>
