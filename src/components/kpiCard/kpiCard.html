<div class="kpi-card">

    <div class="kpi-top">

        <div>

            <div class="kpi-title">

                {{title}}

            </div>

            <div class="kpi-value">

                {{value}}

            </div>

        </div>

        <div class="kpi-icon">

            <i data-lucide="{{icon}}"></i>

        </div>

    </div>

    <div class="kpi-footer">

        <span class="kpi-trend">

            ▲ 0%

        </span>

        <span class="kpi-compare">

            vs Previous Month

        </span>

    </div>

</div>
