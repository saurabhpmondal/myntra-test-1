<div class="dashboard-card">

    <div class="shipment-toolbar">

        <div class="shipment-filters">

            <div class="shipment-field">

                <label>Sale Days</label>

                <select id="saleDays">

                    <option value="30" selected>30 Days</option>
                    <option value="45">45 Days</option>
                    <option value="60">60 Days</option>

                </select>

            </div>

            <div class="shipment-field">

                <label>Target Cover</label>

                <select id="targetCover">

                    <option value="45" selected>45 Days</option>
                    <option value="60">60 Days</option>
                    <option value="90">90 Days</option>

                </select>

            </div>

            <div class="shipment-field">

                <label>Recall Trigger</label>

                <select id="recallTrigger">

                    <option value="60" selected>60 Days</option>
                    <option value="90">90 Days</option>
                    <option value="120">120 Days</option>

                </select>

            </div>

            <div class="shipment-button">

                <button id="generateShipment">

                    Generate Shipment

                </button>

            </div>

        </div>

    </div>

    <div
        id="shipmentActions"
        class="shipment-actions"
        style="display:none;">

        <input

            id="shipmentSearch"

            type="text"

            placeholder="Search Style ID / ERP SKU..."

        />

        <button id="exportShipment">

            Export Excel

        </button>

    </div>

</div>
