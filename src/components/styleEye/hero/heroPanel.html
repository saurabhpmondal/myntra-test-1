<div class="hero-panel">

    <div class="hero-left">

        <div
            class="hero-image"
            id="heroImageContainer"
        >

            <img
                id="heroImage"
                alt="Style Image"
            >

            <div
                id="heroImagePlaceholder"
                class="hero-image-placeholder"
            >

                👗

                <span>

                    Image Not Available

                </span>

            </div>

        </div>

    </div>

    <div class="hero-right">

        <div class="hero-top">

            <div>

                <h2 id="heroBrand"></h2>

                <div
                    id="heroCategory"
                    class="hero-category"
                ></div>

            </div>

            <div
                id="heroStatus"
                class="hero-status"
            ></div>

        </div>

        <div class="hero-details">

            <div class="hero-row">

                <span>Style ID</span>

                <strong id="heroStyleId"></strong>

            </div>

            <div class="hero-row">

                <span>ERP SKU</span>

                <strong id="heroErpSku"></strong>

            </div>

            <div class="hero-row">

                <span>Launch Date</span>

                <strong id="heroLaunchDate"></strong>

            </div>

            <div class="hero-row">

                <span>Launch Age</span>

                <strong id="heroLaunchAge"></strong>

            </div>

        </div>

        <div class="hero-kpis">

            <div class="hero-kpi">

                <small>MRP</small>

                <strong id="heroMrp"></strong>

            </div>

            <div class="hero-kpi">

                <small>TP</small>

                <strong id="heroTp"></strong>

            </div>

            <div class="hero-kpi">

                <small>Brand</small>

                <strong id="heroBrandSmall"></strong>

            </div>

            <div class="hero-kpi">

                <small>Category</small>

                <strong id="heroCategorySmall"></strong>

            </div>

        </div>

    </div>

</div>
